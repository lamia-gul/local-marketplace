<!-- Glassmorphism Category Cards Section -->
<style>
    /* Glassmorphism Category Cards */
    .glass-categories-section {
        padding: 4rem 0;
        background: #FFFFFF;
    }

    .glass-categories-title {
        font-size: 2.5rem;
        font-weight: 700;
        color: #111827;
        margin-bottom: 2rem;
        text-align: center;
    }

    .glass-cards-container {
        display: flex;
        gap: 1.5rem;
        overflow-x: auto;
        padding: 1rem 0;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
    }

    /* Hide scrollbar but keep functionality */
    .glass-cards-container::-webkit-scrollbar {
        height: 8px;
    }

    .glass-cards-container::-webkit-scrollbar-track {
        background: #F3F4F6;
        border-radius: 10px;
    }

    .glass-cards-container::-webkit-scrollbar-thumb {
        background: #D1D5DB;
        border-radius: 10px;
    }

    .glass-cards-container::-webkit-scrollbar-thumb:hover {
        background: #9CA3AF;
    }

    /* Glass Category Card */
    .glass-category-card {
        position: relative;
        min-width: 280px;
        width: 280px;
        aspect-ratio: 3 / 4;
        border-radius: 1.5rem;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        flex-shrink: 0;
    }

    .glass-category-card:hover {
        transform: scale(1.05);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    /* Background Image */
    .glass-card-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        top: 0;
        left: 0;
    }

    /* Glass Overlay - Bottom 30% */
    .glass-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 30%;
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
    }

    /* Category Name */
    .glass-category-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: #000000;
        text-align: center;
        letter-spacing: 0.02em;
        text-shadow: 0 2px 4px rgba(255, 255, 255, 0.5);
    }

    /* Responsive */
    @media (max-width: 768px) {
        .glass-category-card {
            min-width: 220px;
            width: 220px;
        }

        .glass-categories-title {
            font-size: 2rem;
        }

        .glass-category-name {
            font-size: 1.1rem;
        }
    }
</style>
