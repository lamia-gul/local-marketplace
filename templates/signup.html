<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Community | Local Marketplace</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            overflow-x: hidden;
        }

        .split-container {
            display: flex;
            min-height: 100vh;
        }

        /* Left Side - Image */
        .left-side {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=1200') center/cover;
            position: relative;
        }

        .left-side::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(140, 198, 63, 0.1), rgba(0, 0, 0, 0.3));
        }

        /* Right Side - Form */
        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            background: #FFFFFF;
            overflow-y: auto;
        }

        .form-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        /* Logo */
        .logo {
            margin-bottom: 3rem;
        }

        .logo img {
            height: 40px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .logo img:hover {
            opacity: 0.8;
        }

        /* Form Header */
        .form-header {
            margin-bottom: 2.5rem;
        }

        .form-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 0.5rem;
        }

        .form-subtitle {
            font-size: 0.938rem;
            color: #6B7280;
            font-weight: 400;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1.25rem;
            border: none;
            border-bottom: 2px solid #E5E7EB;
            font-size: 0.938rem;
            color: #1F2937;
            background: transparent;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .input-field:focus {
            border-bottom-color: #8CC63F;
        }

        .input-field::placeholder {
            color: #9CA3AF;
        }

        /* Password Toggle */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #6B7280;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: #8CC63F;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: #7AB52F;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(140, 198, 63, 0.3);
        }

        /* Social Login */
        .social-divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }

        .social-divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #E5E7EB;
        }

        .social-divider span {
            position: relative;
            background: white;
            padding: 0 1rem;
            font-size: 0.875rem;
            color: #9CA3AF;
            font-weight: 500;
        }

        .social-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .social-btn {
            flex: 1;
            padding: 0.875rem;
            border: 1px solid #E5E7EB;
            border-radius: 50px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.938rem;
            color: #1F2937;
            font-weight: 500;
        }

        .social-btn:hover {
            border-color: #8CC63F;
            background: #F9FAFB;
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: 1.25rem;
        }

        /* Switch Link */
        .switch-link {
            text-align: center;
            font-size: 0.938rem;
            color: #6B7280;
        }

        .switch-link a {
            color: #8CC63F;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .switch-link a:hover {
            color: #7AB52F;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .left-side {
                display: none;
            }

            .right-side {
                padding: 2rem;
            }

            .form-title {
                font-size: 2rem;
            }

            .input-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .right-side {
                padding: 1.5rem;
            }

            .form-container {
                max-width: 100%;
            }

            .social-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <!-- Left Side - Image -->
        <div class="left-side"></div>

        <!-- Right Side - Form -->
        <div class="right-side">
            <div class="form-container">
                <!-- Logo -->
                <div class="logo">
                    <a href="/home">
                        <img src="{{ url_for('static', filename='images/loci-logo.png') }}" alt="Local Marketplace">
                    </a>
                </div>

                <!-- Form Header -->
                <div class="form-header">
                    <h1 class="form-title">Join the Community</h1>
                    <p class="form-subtitle">Create your account to get started</p>
                </div>

                <!-- Signup Form -->
                <form action="/register" method="POST" id="signupForm">
                    <!-- Name Fields -->
                    <div class="input-row">
                        <input
                            type="text"
                            name="first_name"
                            class="input-field"
                            placeholder="First Name"
                            required
                        >
                        <input
                            type="text"
                            name="last_name"
                            class="input-field"
                            placeholder="Last Name"
                            required
                        >
                    </div>

                    <!-- Email -->
                    <div class="input-group">
                        <input
                            type="email"
                            name="email"
                            class="input-field"
                            placeholder="Email Address"
                            required
                        >
                    </div>

                    <!-- Phone -->
                    <div class="input-group">
                        <input
                            type="tel"
                            name="phone"
                            class="input-field"
                            placeholder="Phone Number"
                            required
                        >
                    </div>

                    <!-- Password -->
                    <div class="input-group">
                        <div class="password-wrapper">
                            <input
                                type="password"
                                name="password"
                                id="passwordInput"
                                class="input-field"
                                placeholder="Password"
                                required
                            >
                            <i class="fa-solid fa-eye-slash password-toggle" id="togglePassword" onclick="togglePassword('passwordInput', 'togglePassword')"></i>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="input-group">
                        <div class="password-wrapper">
                            <input
                                type="password"
                                name="confirm_password"
                                id="confirmPasswordInput"
                                class="input-field"
                                placeholder="Confirm Password"
                                required
                            >
                            <i class="fa-solid fa-eye-slash password-toggle" id="toggleConfirmPassword" onclick="togglePassword('confirmPasswordInput', 'toggleConfirmPassword')"></i>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
                </form>

                <!-- Social Login Divider -->
                <div class="social-divider">
                    <span>or continue with</span>
                </div>

                <!-- Social Login Buttons -->
                <div class="social-buttons">
                    <button class="social-btn" type="button">
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>
                    <button class="social-btn" type="button">
                        <i class="fa-brands fa-apple"></i>
                        Apple
                    </button>
                </div>

                <!-- Switch to Login -->
                <div class="switch-link">
                    Already a member? <a href="/login">Log In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const toggleIcon = document.getElementById(iconId);

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            }
        }

        // Signup Form Submission Handler
        document.addEventListener('DOMContentLoaded', function() {
            const signupForm = document.getElementById('signupForm');
            const submitBtn = document.getElementById('submitBtn');

            if (signupForm) {
                signupForm.addEventListener('submit', function(event) {
                    event.preventDefault(); // Prevent default form submission

                    // Validate passwords match
                    const password = document.getElementById('passwordInput').value;
                    const confirmPassword = document.getElementById('confirmPasswordInput').value;

                    if (password !== confirmPassword) {
                        alert('Passwords do not match!');
                        return;
                    }

                    // Get form data
                    const formData = new FormData(signupForm);

                    // Show loading state
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Creating Account...';
                    submitBtn.style.opacity = '0.7';
                    submitBtn.style.cursor = 'not-allowed';

                    // Simulate authentication (replace with actual backend call)
                    setTimeout(() => {
                        // Submit form data to backend
                        fetch('/register', {
                            method: 'POST',
                            body: formData
                        })
                        .then(response => {
                            if (response.ok) {
                                // Successful registration - redirect to home
                                window.location.href = '/home';
                            } else {
                                // Failed registration - reset button and show error
                                submitBtn.disabled = false;
                                submitBtn.textContent = 'Create Account';
                                submitBtn.style.opacity = '1';
                                submitBtn.style.cursor = 'pointer';

                                // Show error message
                                alert('Registration failed. Please try again.');
                            }
                        })
                        .catch(error => {
                            console.error('Registration error:', error);
                            submitBtn.disabled = false;
                            submitBtn.textContent = 'Create Account';
                            submitBtn.style.opacity = '1';
                            submitBtn.style.cursor = 'pointer';
                            alert('An error occurred. Please try again.');
                        });
                    }, 1000); // 1 second loading state
                });
            }
        });
    </script>
</body>
</html>
